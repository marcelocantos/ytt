name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e .

      - name: --version
        run: |
          out="$(ytt --version)"
          echo "$out"
          [[ "$out" == ytt* ]]

      - name: --help
        run: ytt --help

      - name: --help-agent
        run: |
          out="$(ytt --help-agent)"
          echo "$out" | head -3
          [[ "$out" == *"ytt"* && "$out" == *"Exit codes"* ]]

      - name: no-args exits 2
        run: |
          set +e
          ytt
          rc=$?
          set -e
          [[ $rc -eq 2 ]]

      - name: extract_video_id unit check
        run: |
          python -c "
          from ytt import extract_video_id
          assert extract_video_id('dQw4w9WgXcQ') == 'dQw4w9WgXcQ'
          assert extract_video_id('https://www.youtube.com/watch?v=dQw4w9WgXcQ') == 'dQw4w9WgXcQ'
          assert extract_video_id('https://www.youtube.com/watch?v=dQw4w9WgXcQ&t=30s') == 'dQw4w9WgXcQ'
          assert extract_video_id('https://youtu.be/dQw4w9WgXcQ') == 'dQw4w9WgXcQ'
          assert extract_video_id('https://youtu.be/dQw4w9WgXcQ?t=30') == 'dQw4w9WgXcQ'
          assert extract_video_id('https://youtube.com/shorts/dQw4w9WgXcQ') == 'dQw4w9WgXcQ'
          print('extract_video_id: OK')
          "

      - name: format_timestamp unit check
        run: |
          python -c "
          from ytt import format_timestamp
          assert format_timestamp(0) == '[00:00]'
          assert format_timestamp(65) == '[01:05]'
          assert format_timestamp(3600) == '[1:00:00]'
          assert format_timestamp(3661) == '[1:01:01]'
          print('format_timestamp: OK')
          "

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Check artefacts
        run: |
          pip install twine
          twine check dist/*

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Syntax-check shell scripts
        run: |
          bash -n scripts/playlist-ingest/ingest.sh
          bash -n scripts/playlist-ingest/ingest-one.sh
          bash -n scripts/playlist-ingest/build-index.sh
      - name: Run bats tests
        run: bats scripts/playlist-ingest/tests/
