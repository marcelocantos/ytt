name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild (e.g., v0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify tag matches __version__
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          tag="${tag#v}"
          pyver="$(python -c 'import re,pathlib; print(re.search(r"__version__ = \"([^\"]+)\"", pathlib.Path("ytt.py").read_text()).group(1))')"
          echo "tag=$tag pyver=$pyver"
          if [[ "$tag" != "$pyver" ]]; then
            echo "::error::tag ($tag) != ytt.__version__ ($pyver)"
            exit 1
          fi

      - name: Install deps + PyInstaller
        run: |
          pip install pyinstaller .

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --onefile --name ytt --strip ytt.py
          ./dist/ytt --version

      - name: Package tarball
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          version="${TAG#v}"
          name="ytt-${version}-${{ matrix.target }}"
          mkdir -p "pkg/${name}"
          cp dist/ytt "pkg/${name}/ytt"
          tar -C pkg -czf "${name}.tar.gz" "${name}"
          shasum -a 256 "${name}.tar.gz"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        shell: bash
        run: |
          gh release upload "$TAG" ytt-*.tar.gz --repo "${{ github.repository }}" --clobber

  homebrew:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          formula_folder: Formula
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          version: ${{ github.event.release.tag_name || inputs.tag }}
          install: 'bin.install "ytt"'
          test: 'assert_match "ytt #{version}", shell_output("#{bin}/ytt --version")'
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          skip_checksum: true
          update_readme_table: true
